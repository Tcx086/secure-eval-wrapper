name: CI

on:
  push:
    paths:
      - ".github/workflows/ci.yml"
      - ".project/**"
      - "docs/**"
      - "open-core/**"
      - "AGENTS.md"
      - "README.md"
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - ".project/**"
      - "docs/**"
      - "open-core/**"
      - "AGENTS.md"
      - "README.md"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-unit:
    name: Package and unit (${{ matrix.os }}, Python ${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.12"]
        include:
          - os: ubuntu-latest
            python: "3.11"
          - os: ubuntu-latest
            python: "3.13"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "./open-core[test]"
      - run: python -c "import secure_eval_wrapper; import secure_eval_wrapper.execution; import secure_eval_wrapper.backtesting; import secure_eval_wrapper.monitoring; import secure_eval_wrapper.fix; import secure_eval_wrapper.paper"
      - name: Dedicated Phase 5 second-audit regression suite
        run: python -m unittest discover -s open-core/tests -p "test_phase5_second_audit.py" -v
      - name: Dedicated Phase 5 third-audit offline regression suite
        run: python -m unittest discover -s open-core/tests -p "test_phase5_third_audit.py" -v
      - name: Dedicated Phase 5 fourth-audit offline regression suite
        run: python -m unittest discover -s open-core/tests -p "test_phase5_fourth_audit.py" -v
      - name: Anti-lookahead and future-invariance suite
        run: python -m unittest discover -s open-core/tests -p "test_phase5_invariance.py" -v
      - name: Complete offline suite
        run: python -m unittest discover -s open-core/tests -v
      - name: Dedicated Phase 6 monitoring and valuation suites
        run: python -m unittest discover -s open-core/tests -p "test_phase6_monitoring.py" -v && python -m unittest discover -s open-core/tests -p "test_phase6_projection_valuation.py" -v
      - name: Dedicated simulated FIX codec, session, order-flow, latency, and fault suite
        run: python -m unittest discover -s open-core/tests -p "test_phase6_fix*.py" -v
      - name: Phase 6 first-audit offline regression suite
        run: python -m unittest discover -s open-core/tests -p "test_phase6_first_audit_repairs.py" -v
      - name: Phase 6 second-audit concurrency and rejection regression suite
        run: python -m unittest discover -s open-core/tests -p "test_phase6_second_audit.py" -v
      - name: Phase 7 contracts, preflight, approval, and endpoint safety
        run: python -m unittest discover -s open-core/tests -p "test_phase7_contracts_preflight_approval.py" -v
      - name: Phase 7 internal venue, accounting, reconciliation, recovery, and kill switch
        run: python -m unittest discover -s open-core/tests -p "test_phase7_internal_accounting_reconciliation_kill.py" -v
      - name: Phase 7 official-demo fake transport, credential redaction, CLI, monitoring, and boundaries
        run: python -m unittest discover -s open-core/tests -p "test_phase7_official_sandbox_adapter.py" -v && python -m unittest discover -s open-core/tests -p "test_phase7_cli_monitoring_boundaries.py" -v
      - name: Compile package and scripts
        run: python -m compileall -q open-core/src open-core/scripts
      - run: secure-eval-backtest
      - run: secure-eval-validate
      - run: secure-eval-monitor
      - run: secure-eval-fix-sim
      - run: secure-eval-paper-preflight
      - run: secure-eval-paper-internal
      - run: secure-eval-paper-run
      - run: secure-eval-paper-status
      - run: secure-eval-paper-kill
      - run: secure-eval-paper-reconcile

  postgres-integration:
    name: PostgreSQL 16 integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: secure_eval_wrapper
          POSTGRES_USER: phase5_ci
          POSTGRES_PASSWORD: phase5_ci_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U phase5_ci -d secure_eval_wrapper"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: "5432"
      POSTGRES_DB: secure_eval_wrapper
      POSTGRES_USER: phase5_ci
      POSTGRES_PASSWORD: phase5_ci_only
      POSTGRES_SSLMODE: disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e "./open-core[postgres,test]"
      - name: Clean migration install 0001 through 0021
        run: python open-core/scripts/apply_postgres_migrations.py
      - name: Migration hashes and Phase 5/6/7 catalog
        run: |
          python open-core/scripts/verify_postgres_schema.py --migration-only
          python open-core/scripts/verify_phase5_postgres_schema.py
          python open-core/scripts/verify_phase7_postgres_schema.py
      - name: Real repository, all-writer conflicts, bundle idempotency, constraints, and rollback
        env:
          RUN_POSTGRES_INTEGRATION: "true"
        run: python -m unittest discover -s open-core/tests -p "test_phase5_postgres_integration.py" -v
      - name: Overlapping-run membership, isolation, deletion, and rollback
        env:
          RUN_POSTGRES_INTEGRATION: "true"
        run: python -m unittest discover -s open-core/tests -p "test_phase5_third_audit.py" -v
      - name: Run-scoped order and position projection overlap regressions
        env:
          RUN_POSTGRES_INTEGRATION: "true"
        run: python -m unittest discover -s open-core/tests -p "test_phase5_fourth_audit.py" -v
      - name: Phase 6 monitoring, simulated FIX persistence, conflicts, half-open reads, and rollback
        env:
          RUN_POSTGRES_INTEGRATION: "true"
        run: python -m unittest discover -s open-core/tests -p "test_phase6_postgres_integration.py" -v
      - name: Phase 6 first-audit PostgreSQL and real CLI persistence regressions
        env:
          RUN_POSTGRES_INTEGRATION: "true"
          ENABLE_POSTGRES_PERSISTENCE: "true"
        run: python -m unittest discover -s open-core/tests -p "test_phase6_first_audit_postgres.py" -v
      - name: Phase 6 second-audit event authority, occurrences, lineage, and rollback
        env:
          RUN_POSTGRES_INTEGRATION: "true"
        run: python -m unittest discover -s open-core/tests -p "test_phase6_second_audit_postgres.py" -v
      - name: Phase 7 PostgreSQL transactions, idempotency, rollback, recovery, redaction, and complete CLI replay
        env:
          RUN_POSTGRES_INTEGRATION: "true"
          ENABLE_POSTGRES_PERSISTENCE: "true"
        run: python -m unittest discover -s open-core/tests -p "test_phase7_postgres_integration.py" -v
      - name: Phase 7 durable crash matrix plus fourth/fifth-audit price authority, terminal fill recovery, reservation equality, durable expiry, and claim routing
        env:
          RUN_POSTGRES_INTEGRATION: "true"
        run: |
          python -m unittest discover -s open-core/tests -p "test_phase7_durable_postgres.py" -v
          python -m unittest discover -s open-core/tests -p "test_phase7_third_audit_repairs.py" -v
          python -m unittest discover -s open-core/tests -p "test_phase7_fourth_audit.py" -v
          python -m unittest discover -s open-core/tests -p "test_phase7_fifth_audit.py" -v
      - name: Seeded 0013 through 0021 upgrade with existing Phase 5, Phase 6, and Phase 7 rows
        run: |
          python open-core/scripts/apply_postgres_migrations.py --database secure_eval_upgrade --create-database --through 0009 --seed-phase5
          python open-core/scripts/apply_postgres_migrations.py --database secure_eval_upgrade --from-migration 0010 --through 0011
          python open-core/scripts/apply_postgres_migrations.py --database secure_eval_upgrade --from-migration 0012 --through 0012
          python open-core/scripts/apply_postgres_migrations.py --database secure_eval_upgrade --from-migration 0013 --through 0013 --seed-phase6
          python open-core/scripts/apply_postgres_migrations.py --database secure_eval_upgrade --from-migration 0014 --through 0014
          python open-core/scripts/apply_postgres_migrations.py --database secure_eval_upgrade --from-migration 0015 --through 0015
          python open-core/scripts/apply_postgres_migrations.py --database secure_eval_upgrade --from-migration 0016 --through 0016
          POSTGRES_DB=secure_eval_upgrade python open-core/scripts/seed_phase7_upgrade.py
          python open-core/scripts/apply_postgres_migrations.py --database secure_eval_upgrade --from-migration 0017 --through 0017
          python open-core/scripts/apply_postgres_migrations.py --database secure_eval_upgrade --from-migration 0018 --through 0018
          python open-core/scripts/apply_postgres_migrations.py --database secure_eval_upgrade --from-migration 0019 --through 0019
          python open-core/scripts/apply_postgres_migrations.py --database secure_eval_upgrade --from-migration 0020 --through 0020
          python open-core/scripts/apply_postgres_migrations.py --database secure_eval_upgrade --from-migration 0021 --through 0021
          POSTGRES_DB=secure_eval_upgrade python open-core/scripts/verify_postgres_schema.py
          POSTGRES_DB=secure_eval_upgrade python open-core/scripts/verify_phase5_postgres_schema.py
          POSTGRES_DB=secure_eval_upgrade python open-core/scripts/verify_phase7_postgres_schema.py

  boundary:
    name: Public/private and runtime boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python open-core/src/secure_eval_wrapper/validation.py --skip-tests
